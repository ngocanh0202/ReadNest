version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: readnest-api
    ports:
      - "5000:8080"     
      - "5001:8081"   
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/app/certs/https.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=YourPasswordHere
    volumes:
      - ./data/uploads:/app/Uploads/images
      - ./data/sqlite:/app/data
      - ./certs:/app/certs   
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: readnest-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped